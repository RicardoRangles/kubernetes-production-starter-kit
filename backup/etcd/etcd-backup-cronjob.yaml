apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-backup
  namespace: velero
spec:
  schedule: "0 */6 * * *"   # cada 6 horas
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2

  jobTemplate:
    spec:
      template:
        spec:

          restartPolicy: Never

          nodeSelector:
            node-role.kubernetes.io/control-plane: ""

          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule

          containers:
            - name: etcd-backup

              image: bitnami/etcd:3.5

              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  echo "Starting etcd backup..."

                  export ETCDCTL_API=3

                  SNAPSHOT=/backup/etcd-$(date +%Y%m%d%H%M%S).db

                  etcdctl snapshot save $SNAPSHOT \
                    --endpoints=${ETCD_ENDPOINTS} \
                    --cacert=/etc/kubernetes/pki/etcd/ca.crt \
                    --cert=/etc/kubernetes/pki/etcd/server.crt \
                    --key=/etc/kubernetes/pki/etcd/server.key

                  echo "Snapshot created"

                  echo "Uploading snapshot to object storage..."

                  wget https://dl.min.io/client/mc/release/linux-amd64/mc
                  chmod +x mc
                  mv mc /usr/local/bin/mc

                  mc alias set storage ${S3_ENDPOINT} ${S3_ACCESS_KEY} ${S3_SECRET_KEY}

                  mc cp $SNAPSHOT storage/${S3_BUCKET}/etcd/

                  echo "Cleaning old backups (keep 5)"

                  mc ls storage/${S3_BUCKET}/etcd/ \
                  | awk '{print $5}' \
                  | sort -r \
                  | awk 'NR>5' \
                  | xargs -r -I {} mc rm storage/${S3_BUCKET}/etcd/{}

                  echo "Backup finished"

              env:

                - name: ETCD_ENDPOINTS
                  value: "https://etcd1:2379,https://etcd2:2379,https://etcd3:2379"

                - name: S3_ENDPOINT
                  value: "http://minio:9000"

                - name: S3_BUCKET
                  value: "kubernetes-backups"

                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: etcd-backup-secret
                      key: access_key

                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: etcd-backup-secret
                      key: secret_key

              volumeMounts:

                - mountPath: /etc/kubernetes/pki/etcd
                  name: etcd-certs
                  readOnly: true

                - mountPath: /backup
                  name: etcd-backup

          volumes:

            - name: etcd-certs
              hostPath:
                path: /etc/kubernetes/pki/etcd

            - name: etcd-backup
              emptyDir: {}
