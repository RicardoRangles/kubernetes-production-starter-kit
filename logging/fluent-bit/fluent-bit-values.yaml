daemonset:
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

    - key: "node-role.kubernetes.io/master"
      operator: "Exists"
      effect: "NoSchedule"

    - key: "node-role.kubernetes.io/worker"
      operator: "Exists"
      effect: "NoSchedule"

  nodeSelector: {}

serviceAccount:
  create: true
  name: fluent-bit

rbac:
  create: true

config:

  service: |
    [SERVICE]
        Flush           1
        Daemon          Off
        Log_Level       info
        Parsers_File    parsers.conf

  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/kubernetes/audit/audit.log
        Tag               kube.audit
        Read_from_Head    true
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        Refresh_Interval  5

  filters: |
    @INCLUDE filters-audit.conf

  outputs: |
    [OUTPUT]
        Name                es
        Match               kube.audit
        Host                elasticsearch-master.elk.svc.cluster.local
        Port                9200
        Logstash_Format     On
        Replace_Dots        On
        HTTP_User           elastic
        HTTP_Passwd         changeme
        tls                 On
        tls.verify          Off
        Index               kube-audit
        Suppress_Type_Name  On

extraVolumeMounts:
  - name: audit-log
    mountPath: /var/log/kubernetes/audit

extraVolumes:
  - name: audit-log
    hostPath:
      path: /var/log/kubernetes/audit
      type: DirectoryOrCreate
